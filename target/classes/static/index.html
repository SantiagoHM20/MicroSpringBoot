<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MicroSpringBootG</title>
    <style>
        body {
            font-family: Georgia, "Times New Roman", serif;
            margin: 40px;
            background: linear-gradient(135deg, #f8f6f0, #dce8f7);
            color: #1f2937;
        }

        .card {
            max-width: 760px;
            margin: 0 auto;
            padding: 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin-top: 0;
            letter-spacing: 0.4px;
        }

        code {
            background: #eef2ff;
            padding: 2px 6px;
            border-radius: 5px;
        }

        img {
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>MicroSpringBootG</h1>
    <p>Servidor HTTP + framework IoC reflexivo en Java.</p>
    <p>Prueba de endpoint: <code>/greeting?name=Juan</code></p>
    <img src="/logo.png" alt="Logo" width="96" height="96" />
</div>
</body>
</html>
